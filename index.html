<!DOCTYPE html>
<html lang="ky">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NURS — Китептер дүйнөсү</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0e0b07;
      --surface:   #1a1510;
      --card:      #211c15;
      --border:    #3a3020;
      --gold:      #c9a84c;
      --gold-dim:  #a07830;
      --cream:     #f0e6d0;
      --muted:     #7a6f5e;
      --accent:    #e05c2a;
    }

    :root.light {
      --bg:        #f5efe4;
      --surface:   #ede4d3;
      --card:      #fff8ee;
      --border:    #ddd0b8;
      --gold:      #a07020;
      --gold-dim:  #b88a30;
      --cream:     #2a1f0e;
      --muted:     #8a7a60;
      --accent:    #e05c2a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* background texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, #3a2a0a33 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 90% 80%, #c9a84c0d 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* grain overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeDown 0.8s ease both;
    }

    .logo-wrap {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 2px solid var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      background: var(--surface);
      box-shadow: 0 0 0 8px #c9a84c0f, 0 8px 32px #00000060;
      position: relative;
      overflow: hidden;
    }

    .logo-wrap svg { width: 44px; height: 44px; }
    .logo-wrap img { width: 120%; height: 120%; object-fit: cover; }

    .logo-wrap .nurs-logo {
      width: 120%;
      height: 120%;
      margin-bottom: 20px
    }
    /* NURS жазуусу — күн режиминде кара, түн режиминде ак */
    .nurs-logo .nurs-text { fill: #ffffff; }
    :root.light .nurs-logo .nurs-text { fill: #231f20; }

    .shop-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 6vw, 34px);
      font-weight: 700;
      color: var(--cream);
      letter-spacing: -0.5px;
      line-height: 1.15;
    }

    .shop-name em {
      font-style: italic;
      color: var(--gold);
    }

    .tagline {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px auto 0;
      width: 160px;
    }
    .divider span { height: 1px; flex: 1; background: var(--border); }
    .divider i { color: var(--gold-dim); font-size: 8px; }

    /* ── LINKS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--cream);
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      cursor: pointer;
    }

    .link-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--gold) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }

    .link-card:hover {
      border-color: var(--gold-dim);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px #00000050, 0 0 0 1px #c9a84c20;
    }
    .link-card:hover::before { opacity: 0.04; }
    .link-card:active { transform: translateY(0); }

    .link-card.featured {
      border-color: var(--gold-dim);
      background: linear-gradient(135deg, #2a2015 0%, var(--card) 100%);
    }
    :root.light .link-card.featured {
      background: linear-gradient(135deg, #f0dfa8 0%, var(--card) 100%);
    }
    .link-card.featured .card-icon { background: var(--gold); color: #fff; }

    .card-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      transition: background 0.35s, border-color 0.35s;
    }

    :root.light .card-icon {
      background: var(--surface);
      border-color: var(--border);
    }

    :root.light .link-card.featured .card-icon {
      background: var(--gold);
      color: #fff;
    }

    .card-body { flex: 1; min-width: 0; }

    .card-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--cream);
      display: block;
    }

    .card-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-arrow {
      color: var(--muted);
      font-size: 18px;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
    }
    .link-card:hover .card-arrow { color: var(--gold); transform: translateX(3px); }

    /* badge */
    .badge {
      position: absolute; top: 10px; right: 48px;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      width: 100%;
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 24px 0 8px 4px;
    }
    .section-label:first-of-type { margin-top: 0; }

    /* ── SOCIAL ROW ── */
    .social-row {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      width: 100%;
    }

    .social-btn {
      flex: 1;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .social-btn:hover {
      color: var(--cream);
      border-color: var(--border);
      background: var(--surface);
    }
    .social-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 100;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 2px 12px #00000030;
    }
    .theme-toggle:hover {
      border-color: var(--gold-dim);
      transform: rotate(20deg) scale(1.08);
      box-shadow: 0 4px 18px #00000040;
    }

    /* light mode bg override */
    :root.light body::before {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, #c9a84c18 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 90% 80%, #a0702010 0%, transparent 60%);
    }

    /* smooth all color transitions */
    body, .link-card, .card-icon, .social-btn, .theme-toggle {
      transition: background 0.35s, color 0.35s, border-color 0.35s;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: #3d3529;
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-card:nth-child(1) { animation: fadeUp 0.5s 0.1s ease both; }
    .link-card:nth-child(2) { animation: fadeUp 0.5s 0.18s ease both; }
    .link-card:nth-child(3) { animation: fadeUp 0.5s 0.26s ease both; }
    .link-card:nth-child(4) { animation: fadeUp 0.5s 0.34s ease both; }
    .link-card:nth-child(5) { animation: fadeUp 0.5s 0.42s ease both; }
    .social-row             { animation: fadeUp 0.5s 0.50s ease both; }
  </style>
</head>

<script>
  const btn = document.getElementById('themeBtn');
  const root = document.documentElement;

  // Сакталган теманы жүктөө
  if (localStorage.getItem('theme') === 'light') {
    root.classList.add('light');
    btn.textContent = '☀️';
  }

  btn.addEventListener('click', () => {
    const isLight = root.classList.toggle('light');
    btn.textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
  });
</script>
